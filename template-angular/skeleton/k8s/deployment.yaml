apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ values.name }}

spec:
  replicas: 2

  selector:
    matchLabels:
      app: {{ values.name }}

  template:
    metadata:
      labels:
        app: {{ values.name }}

    spec:
      containers:
      - name: {{ values.name }}

        image: asia-south1-docker.pkg.dev/backstage-demo-499507/apps/{{ values.name }}:latest

        ports:
        - containerPort: 80