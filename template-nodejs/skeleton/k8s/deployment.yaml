apiVersion: apps/v1
kind: Deployment

metadata:
  name: ${{ values.name }}
  labels:
    app: ${{ values.name }}
    backstage.io/kubernetes-id: ${{ values.name }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ${{ values.name }}

  template:
    metadata:
      labels:
        app: ${{ values.name }}
        backstage.io/kubernetes-id: ${{ values.name }}

    spec:
      containers:
        - name: ${{ values.name }}
          image: ghcr.io/udhayakiran-stack/${{ values.name }}:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000