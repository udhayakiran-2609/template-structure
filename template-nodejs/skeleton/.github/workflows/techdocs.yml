name: Generate TechDocs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

jobs:
  publish-techdocs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install TechDocs CLI
        run: npm install -g @techdocs/cli

      - name: Install MkDocs plugins
        run: pip install mkdocs-techdocs-core

      - name: Generate docs
        run: techdocs-cli generate --source-dir . --output-dir ./site

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Upload to GCS
        run: |
          SERVICE_NAME=$(grep "^  name:" catalog-info.yaml | head -1 | awk '{print $2}')
          gsutil -m cp -r site/* gs://backstage-beindiansai-techdocs/default/component/${SERVICE_NAME}/