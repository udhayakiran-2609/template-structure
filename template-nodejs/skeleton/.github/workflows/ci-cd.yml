name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for Workload Identity Federation
permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: ${{ github.event.repository.name }}
  REGISTRY: us-central1-docker.pkg.dev
  REPO: backstage

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run Tests
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Run lint
        run: npm run lint --if-present

  # ─────────────────────────────────────────
  # JOB 2: Build & Push Docker Image
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image name
        id: image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.image.outputs.image }} \
            --tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.image.outputs.image }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:latest

  # ─────────────────────────────────────────
  # JOB 3: Deploy to Cloud Run
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ needs.build.outputs.image }}
          region: ${{ env.REGION }}
          flags: |
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --timeout=300
            --allow-unauthenticated
            --service-account=backstage-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

  # ─────────────────────────────────────────
  # JOB 4: Publish TechDocs to GCS
  # ─────────────────────────────────────────
  techdocs:
    name: Publish TechDocs
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TechDocs dependencies
        run: |
          pip install mkdocs-techdocs-core
          npm install -g @techdocs/cli

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Generate TechDocs site
        run: |
          techdocs-cli generate \
            --no-docker \
            --source-dir . \
            --output-dir ./site \
            --verbose

      - name: Publish TechDocs to GCS
        run: |
          techdocs-cli publish \
            --publisher-type googleGcs \
            --storage-name ${{ env.PROJECT_ID }}-techdocs \
            --entity ${{ secrets.BACKSTAGE_NAMESPACE }}/component/${{ env.SERVICE_NAME }} \
            --directory ./site

  # ─────────────────────────────────────────
  # JOB 5: Summary
  # ─────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test, build, deploy, techdocs]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Print summary
        run: |
          echo "## 🚀 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TechDocs | ${{ needs.techdocs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Service URL | ${{ needs.deploy.outputs.service_url }} |" >> $GITHUB_STEP_SUMMARY